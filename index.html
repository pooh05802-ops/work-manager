<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초과근무 관리 시스템 V9.4</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-main: #333333;
            --border-color: #dddddd;
            --primary-color: #007bff;
            --holiday-color: #ff4a4a;
            --sat-color: #4a90e2;
            --leave-bg: #ffe0e0;
            --etc-bg: #e0f7fa;
            --duty-bg: #ffc107;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --border-color: #444444;
            --primary-color: #bb86fc;
            --holiday-color: #ff6b6b;
            --sat-color: #64b5f6;
            --leave-bg: #5c2b2b;
            --etc-bg: #004d40;
            --duty-bg: #f57f17;
        }

        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        
        /* 헤더 & 대시보드 */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        select, button, input[type="time"] { padding: 8px 12px; margin: 2px; border-radius: 5px; border: 1px solid var(--border-color); background: var(--container-bg); color: var(--text-main); }
        button { background: var(--primary-color); color: #fff; border: none; cursor: pointer; font-weight: bold; }
        
        .dashboard { background: var(--container-bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; }
        .dashboard strong { color: var(--primary-color); font-size: 1.1em; }
        .dot-split { margin: 0 5px; color: var(--border-color); }
        
        /* 캘린더 네비게이션 & 그리드 */
        .calendar-nav { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 1.3em; font-weight: bold; margin-bottom: 15px; }
        .calendar-nav button { padding: 5px 15px; font-size: 1em; }
        
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-weight: bold; margin-bottom: 5px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        
        .day-cell { background: var(--container-bg); border: 1px solid var(--border-color); border-radius: 5px; padding: 5px; min-height: 85px; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .day-cell.empty { background: transparent; border: none; cursor: default; }
        .day-cell.sunday .num, .day-cell.holiday .num { color: var(--holiday-color); }
        .day-cell.saturday .num { color: var(--sat-color); }
        .day-cell.today-match { border: 2px solid var(--primary-color); background-color: rgba(0, 123, 255, 0.05); }
        .day-cell.future-day { opacity: 0.7; }
        
        /* 셀 내부 레이아웃 */
        .day-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .num { font-weight: bold; font-size: 1.1em; }
        .mini-type-tag { font-size: 0.75em; padding: 2px 5px; border-radius: 4px; background: #eee; color: #333; }
        .mini-type-tag.bg-holiday-work { background: var(--holiday-color); color: white; }
        .mini-type-tag.bg-leave { background: var(--leave-bg); color: var(--text-main); }
        .mini-type-tag.bg-etc { background: var(--etc-bg); color: var(--text-main); }
        
        .day-mid-time { font-size: 0.8em; text-align: center; margin: auto 0; font-weight: bold; }
        
        .day-bottom-row { display: flex; gap: 3px; justify-content: flex-end; flex-wrap: wrap; }
        .mini-meal, .mini-duty-badge { font-size: 0.7em; padding: 2px 4px; border-radius: 3px; background: var(--duty-bg); color: #000; font-weight: bold; }
        .mini-duty-badge.iljik { background: #4caf50; color: white; }
        
        /* 모달 및 팝업 설정 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; }
        .modal.open { display: flex; }
        .modal-content { background: var(--container-bg); padding: 20px; border-radius: 10px; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 15px; cursor: pointer; font-weight: bold; font-size: 1.3em; }
        
        .config-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 5px; }
        .config-date-label { font-weight: bold; width: 100px; }
        .config-duty-checkboxes { display: flex; gap: 10px; font-size: 0.9em; }
        .config-check-lbl { display: flex; align-items: center; gap: 3px; cursor: pointer; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 30px; display: none; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div>
            <select id="themeSelector">
                <option value="light">라이트 모드</option>
                <option value="dark">다크 모드</option>
            </select>
            <select id="gradeSelector">
                <option value="급수1">급수 1 (단가: 10,000원)</option>
                <option value="급수2">급수 2 (단가: 12,000원)</option>
            </select>
        </div>
        <div>
            <button id="trigger-report-popup">월간 정산 내역</button>
            <button id="trigger-config-popup">당직/근무형태 일괄설정</button>
        </div>
    </div>

    <div class="dashboard">
        <div>총 초과근무: <strong id="dash-total-overtime">0H 00M</strong> <span id="dash-predicted-overtime" style="font-size:0.85em; color:gray;"></span></div>
        <div>식수: 조식 <strong id="dash-breakfast-count">0</strong> / 중식 <strong id="dash-lunch-count">0</strong></div>
        <div id="dash-day-distribution" style="font-size: 0.9em; font-weight: bold;"></div>
    </div>

    <div class="calendar-nav">
        <button id="prev-month">◀</button>
        <span id="current-month-display"></span>
        <button id="next-month">▶</button>
    </div>

    <div class="days-header">
        <div style="color:var(--holiday-color)">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div style="color:var(--sat-color)">토</div>
    </div>
    <div id="days-grid" class="days-grid"></div>

    <!-- 타임 모달 (일일 데이터 입력) -->
    <div id="timeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-time-modal">X</span>
            <h3 style="margin-top: 0;"><span id="modal-date-month-year"></span> <span id="modal-date-day"></span>일 (<span id="modal-date-weekday"></span>)</h3>
            <form id="time-form" style="display:flex; flex-direction:column; gap:12px;">
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">근무 형태</label>
                    <select id="modalWorkTypeSelect" style="width: 100%;">
                        <option value="평일">평일</option>
                        <option value="휴무">휴무</option>
                        <option value="휴일근무">휴일근무</option>
                        <option value="연가">연가</option>
                        <option value="대휴">대휴</option>
                        <option value="특가">특가</option>
                        <option value="공가">공가</option>
                        <option value="조퇴">조퇴</option>
                        <option value="오전">오전 반차</option>
                        <option value="오후">오후 반차</option>
                    </select>
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">출근 시간</label>
                    <input type="time" id="startTimeInput" style="width: 100%; box-sizing: border-box;">
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">퇴근 시간</label>
                    <input type="time" id="endTimeInput" style="width: 100%; box-sizing: border-box;">
                </div>
                <div style="background:var(--etc-bg); padding:12px; border-radius:5px; margin-top: 10px;">
                    예상 초과근무: <strong id="preview-overtime">0H 00M</strong><br>
                    예상 식수: <strong id="preview-meals">조식 0 / 급량 0</strong>
                </div>
                <div style="display:flex; gap:10px; margin-top: 10px;">
                    <button type="submit" style="flex:1; padding: 12px; font-size: 1.1em;">저장</button>
                    <button type="button" id="btn-clear" style="flex:1; padding: 12px; font-size: 1.1em; background:#dc3545;">초기화(삭제)</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 월간 정산 모달 -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-report-modal">X</span>
            <h3 style="margin-top: 0;">월간 정산 내역</h3>
            <div style="line-height: 1.8; font-size: 1.1em;">
                <div><strong>초과근무:</strong> <span id="rep-actual-overtime"></span> ➔ <strong id="rep-overtime-amount" style="color:var(--primary-color)"></strong> <br><small>(단가: <span id="rep-hourly-rate"></span>)</small></div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin:10px 0;">
                <div><strong>휴일근무:</strong> <span id="rep-holiday-count"></span> ➔ <strong id="rep-holiday-amount" style="color:var(--primary-color)"></strong> <br><small>(단가: <span id="rep-holiday-rate"></span>)</small></div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin:10px 0;">
                <div><strong>조식 (1~15일):</strong> <span id="rep-bf1-val"></span></div>
                <div><strong>조식 (16~말일):</strong> <span id="rep-bf2-val"></span></div>
                <div><strong>중식:</strong> <span id="rep-lunch-val"></span></div>
            </div>
        </div>
    </div>

    <!-- 일괄 설정 모달 -->
    <div id="configListModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-config-modal">X</span>
            <h3 style="margin-top: 0;">당직 및 근무형태 일괄 설정</h3>
            <div style="display:flex; gap:5px; align-items:center; margin-bottom:15px; background:#f4f6f9; padding: 10px; border-radius: 5px; color:#333;">
                <strong>평일 기본 시간:</strong>
                <input type="time" id="global-cfg-start" style="width: 100px;"> ~ 
                <input type="time" id="global-cfg-end" style="width: 100px;">
                <button id="btn-save-global-cfg">갱신</button>
            </div>
            <div id="config-rows-injector" style="max-height: 50vh; overflow-y:auto; padding-right:5px;"></div>
        </div>
    </div>

    <script>
        const systemToday = new Date();
        const todayMidnight = new Date(systemToday.getFullYear(), systemToday.getMonth(), systemToday.getDate());
        let currentDate = new Date(systemToday.getFullYear(), systemToday.getMonth(), 1);
        let selectedDateStr = "";

        // 로컬 스토리지 데이터 로드
        let globalConfig = JSON.parse(localStorage.getItem('global_work_config_v9_4')) || { startTime: "09:00", endTime: "18:00" };
        let attendanceData = JSON.parse(localStorage.getItem('overtime_data_v9_4')) || {};
        let currentTheme = localStorage.getItem('app_theme_v9_4') || 'light';
        let userGrade = localStorage.getItem('user_grade_v9_4') || '급수1';

        // 단가표
        const gradeRates = {
            '급수1': { hourly: 10000, holiday: 80000 },
            '급수2': { hourly: 12000, holiday: 96000 }
        };

        const daysGrid = document.getElementById('days-grid');
        const reportModal = document.getElementById('reportModal');
        const configListModal = document.getElementById('configListModal');
        const timeModal = document.getElementById('timeModal');

        const modalWorkTypeSelect = document.getElementById('modalWorkTypeSelect');
        const startTimeInput = document.getElementById('startTimeInput');
        const endTimeInput = document.getElementById('endTimeInput');
        const themeSelector = document.getElementById('themeSelector');
        const gradeSelector = document.getElementById('gradeSelector');

        // 초기화
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeSelector.value = currentTheme;
        gradeSelector.value = userGrade;
        document.getElementById('global-cfg-start').value = globalConfig.startTime;
        document.getElementById('global-cfg-end').value = globalConfig.endTime;

        window.onload = () => {
            setupEventListeners();
            renderCalendar();
            updateDashboard();
        };

        function showToast(msg, duration=2000) {
            let toast = document.getElementById('toast-msg');
            if(!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-msg';
                toast.className = 'toast';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, duration);
        }

        // 구글 시트 연동 (가상의 껍데기 함수)
        function sendDataToGoogleSheets(dateStr, data) {
            console.log(`[Google Sheets Sync] ${dateStr}`, data);
        }

        // 2026년 공휴일 기준 처리 (임시)
        function isLegalHoliday(year, month, day) {
            const formatted = `${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const holidays = ['01-01', '02-16', '02-17', '02-18', '03-01', '05-05', '05-24', '06-06', '08-15', '09-24', '09-25', '09-26', '10-03', '10-09', '12-25'];
            return holidays.includes(formatted);
        }

        // 기본 근무형태 판별
        function getBaseWorkType(year, month, day, dayOfWeek, isHoli) {
            if (isHoli || dayOfWeek === 0 || dayOfWeek === 6) return '휴무';
            return '평일';
        }

        // 근무 형태 변경 시 시간입력칸 제어
        function applyTimeInputRules(workType, dateStr) {
            if (['휴무', '연가', '공가', '대휴', '특가'].includes(workType)) {
                startTimeInput.value = '';
                endTimeInput.value = '';
            }
        }

        // 일일 시간표 파싱 및 식수, 초과근무 시간 계산
        function parseDailySheet(dateStr, actualWorkType, sTime, eTime) {
            let timeText = (sTime && eTime) ? `${sTime} ~ ${eTime}` : '';
            let breakfast = 0, lunch = 0, overtimeMins = 0;

            if (sTime && eTime && !['휴무', '연가', '공가', '대휴', '특가'].includes(actualWorkType)) {
                if (sTime <= '07:00') breakfast = 1;
                if (sTime <= '12:00' && eTime >= '13:00') lunch = 1;
                
                let s = sTime.split(':').map(Number);
                let e = eTime.split(':').map(Number);
                let startMin = s[0]*60 + s[1];
                let endMin = e[0]*60 + e[1];
                let duration = endMin - startMin;

                if (actualWorkType === '평일') {
                    // 평일 9시간(휴게 1시간 포함) 초과분을 초과근무로 산정
                    if (duration > 9 * 60) overtimeMins = duration - (9 * 60);
                } else if (actualWorkType === '휴일근무') {
                    // 휴일 1시간 공제
                    overtimeMins = duration > 60 ? duration - 60 : 0;
                }
            }
            return { timeText, breakfast, lunch, overtimeMins };
        }

        /* ----------------------------------------------------
           요청하신 잘린 부분 캘린더 렌더링 로직 (완전 복구)
        ---------------------------------------------------- */
        function renderCalendar() {
            daysGrid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('current-month-display').textContent = `${year}년 ${month + 1}월`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            // 빈 셀 채우기
            for (let i = 0; i < firstDay; i++) {
                let emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                daysGrid.appendChild(emptyCell);
            }
            
            // 날짜 셀 채우기
            for (let day = 1; day <= lastDay; day++) {
                const cellDate = new Date(year, month, day);
                const dayOfWeek = cellDate.getDay();
                const isHoli = isLegalHoliday(year, month, day);
                
                let dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                if (dayOfWeek === 0) dayCell.classList.add('sunday');
                if (dayOfWeek === 6) dayCell.classList.add('saturday');
                if (isHoli) dayCell.classList.add('holiday');
                
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isFuture = cellDate > systemToday;
                if (isFuture) dayCell.classList.add('future-day');
                
                if (year === systemToday.getFullYear() && month === systemToday.getMonth() && day === systemToday.getDate()) {
                    dayCell.classList.add('today-match');
                }

                let workType = getBaseWorkType(year, month, day, dayOfWeek, isHoli);
                let savedData = attendanceData[dateStr] || {};
                let actualWorkType = savedData.workType || workType;

                // [요청 반영] 금요일 기본 퇴근시간 15:00 및 출근시간 06:00 적용
                let sTime = savedData.startTime !== undefined ? savedData.startTime : (actualWorkType === '평일' ? (dayOfWeek === 5 ? "06:00" : globalConfig.startTime) : "");
                let eTime = savedData.endTime !== undefined ? savedData.endTime : (actualWorkType === '평일' ? (dayOfWeek === 5 ? "15:00" : globalConfig.endTime) : "");

                let parsed = parseDailySheet(dateStr, actualWorkType, sTime, eTime);

                let topRow = document.createElement('div');
                topRow.className = 'day-top-row';
                
                let numSpan = document.createElement('span');
                numSpan.className = 'num';
                numSpan.textContent = day;
                topRow.appendChild(numSpan);

                let typeTag = document.createElement('div');
                typeTag.className = 'mini-type-tag';
                typeTag.textContent = actualWorkType;
                
                // 태그 색상 분류
                if (actualWorkType === '휴일근무') typeTag.classList.add('bg-holiday-work');
                else if (['연가','대휴','특가','공가','조퇴','오전','오후'].includes(actualWorkType)) typeTag.classList.add('bg-leave');
                else if (actualWorkType !== '평일' && actualWorkType !== '휴무') typeTag.classList.add('bg-etc');
                
                topRow.appendChild(typeTag);
                dayCell.appendChild(topRow);

                let midRow = document.createElement('div');
                midRow.className = 'day-mid-time';
                midRow.textContent = parsed.timeText;
                dayCell.appendChild(midRow);

                let btmRow = document.createElement('div');
                btmRow.className = 'day-bottom-row';
                
                if (parsed.breakfast > 0) {
                    let bf = document.createElement('span');
                    bf.className = 'mini-meal';
                    bf.textContent = '☕';
                    btmRow.appendChild(bf);
                }
                if (parsed.lunch > 0) {
                    let lc = document.createElement('span');
                    lc.className = 'mini-meal';
                    lc.textContent = '🍱';
                    btmRow.appendChild(lc);
                }
                if (savedData.isSukjik) {
                    let su = document.createElement('span');
                    su.className = 'mini-duty-badge';
                    su.textContent = '숙';
                    btmRow.appendChild(su);
                }
                if (savedData.isIljik) {
                    let il = document.createElement('span');
                    il.className = 'mini-duty-badge iljik';
                    il.textContent = '일';
                    btmRow.appendChild(il);
                }
                dayCell.appendChild(btmRow);

                dayCell.addEventListener('click', () => openTimeModal(dateStr, day, month, year, dayOfWeek));
                daysGrid.appendChild(dayCell);
            }
        }

        function updateDashboard() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            let totalOvertimeMins = 0;
            let pTotalOvertimeMins = 0;
            let bCount = 0, lCount = 0;
            let weekdayCount = 0, holidayCount = 0, offCount = 0;

            for (let day = 1; day <= lastDay; day++) {
                const cellDate = new Date(year, month, day);
                const dayOfWeek = cellDate.getDay();
                const isHoli = isLegalHoliday(year, month, day);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                let workType = getBaseWorkType(year, month, day, dayOfWeek, isHoli);
                let savedData = attendanceData[dateStr] || {};
                let actualWorkType = savedData.workType || workType;
                
                if (actualWorkType === '평일') weekdayCount++;
                else if (actualWorkType === '휴일근무') holidayCount++;
                else if (actualWorkType === '휴무') offCount++;

                let sTime = savedData.startTime !== undefined ? savedData.startTime : (actualWorkType === '평일' ? (dayOfWeek === 5 ? "06:00" : globalConfig.startTime) : "");
                let eTime = savedData.endTime !== undefined ? savedData.endTime : (actualWorkType === '평일' ? (dayOfWeek === 5 ? "15:00" : globalConfig.endTime) : "");

                let parsed = parseDailySheet(dateStr, actualWorkType, sTime, eTime);

                pTotalOvertimeMins += parsed.overtimeMins;
                
                // 오늘 날짜까지만 실적 합산
                if (cellDate <= todayMidnight) {
                    totalOvertimeMins += parsed.overtimeMins;
                    bCount += parsed.breakfast;
                    lCount += parsed.lunch;
                }
            }

            const h = Math.floor(totalOvertimeMins / 60);
            const m = totalOvertimeMins % 60;
            document.getElementById('dash-total-overtime').textContent = `${h}H ${String(m).padStart(2, '0')}M`;
            
            const ph = Math.floor(pTotalOvertimeMins / 60);
            const pm = pTotalOvertimeMins % 60;
            document.getElementById('dash-predicted-overtime').textContent = `(월 예상 ${ph}h ${String(pm).padStart(2, '0')}m)`;

            document.getElementById('dash-breakfast-count').textContent = bCount;
            document.getElementById('dash-lunch-count').textContent = lCount;
            document.getElementById('dash-day-distribution').innerHTML = `평일 ${weekdayCount}<span class="dot-split">|</span>휴일 ${holidayCount}<span class="dot-split">|</span>휴무 ${offCount}`;
        }

        function setupEventListeners() {
            document.getElementById('prev-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
                updateDashboard();
            });
            
            document.getElementById('next-month').addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
                updateDashboard();
            });
            
            document.getElementById('current-month-display').addEventListener('click', () => {
                currentDate = new Date(systemToday.getFullYear(), systemToday.getMonth(), 1);
                renderCalendar();
                updateDashboard();
            });

            document.getElementById('trigger-report-popup').addEventListener('click', openReportModal);
            document.getElementById('close-report-modal').addEventListener('click', () => reportModal.classList.remove('open'));
            
            document.getElementById('trigger-config-popup').addEventListener('click', openConfigModal);
            document.getElementById('close-config-modal').addEventListener('click', () => configListModal.classList.remove('open'));

            document.getElementById('close-time-modal').addEventListener('click', () => timeModal.classList.remove('open'));
            
            document.getElementById('time-form').addEventListener('submit', saveTimeData);
            document.getElementById('btn-clear').addEventListener('click', clearTimeData);
            
            modalWorkTypeSelect.addEventListener('change', (e) => {
                applyTimeInputRules(e.target.value, selectedDateStr);
                updatePreview();
            });
            
            startTimeInput.addEventListener('input', updatePreview);
            endTimeInput.addEventListener('input', updatePreview);

            themeSelector.addEventListener('change', (e) => {
                currentTheme = e.target.value;
                document.documentElement.setAttribute('data-theme', currentTheme);
                localStorage.setItem('app_theme_v9_4', currentTheme);
            });

            gradeSelector.addEventListener('change', (e) => {
                userGrade = e.target.value;
                localStorage.setItem('user_grade_v9_4', userGrade);
            });

            document.getElementById('btn-save-global-cfg').addEventListener('click', () => {
                globalConfig.startTime = document.getElementById('global-cfg-start').value;
                globalConfig.endTime = document.getElementById('global-cfg-end').value;
                localStorage.setItem('global_work_config_v9_4', JSON.stringify(globalConfig));
                renderCalendar();
                updateDashboard();
                showToast("기본 근무시간이 일괄 적용되었습니다.");
            });
        }

        function openTimeModal(dateStr, day, month, year, dayOfWeek) {
            selectedDateStr = dateStr;
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            
            document.getElementById('modal-date-day').textContent = day;
            document.getElementById('modal-date-month-year').textContent = `${month + 1}월`;
            document.getElementById('modal-date-weekday').textContent = dayNames[dayOfWeek];
            
            let isHoli = isLegalHoliday(year, month, day);
            let defaultType = getBaseWorkType(year, month, day, dayOfWeek, isHoli);
            let saved = attendanceData[dateStr] || {};
            
            modalWorkTypeSelect.value = saved.workType || defaultType;
            
            // 기존 값이 있으면 바인딩, 없으면 요일 기본값 적용
            let sTime = saved.startTime !== undefined ? saved.startTime : (modalWorkTypeSelect.value === '평일' ? (dayOfWeek === 5 ? "06:00" : globalConfig.startTime) : "");
            let eTime = saved.endTime !== undefined ? saved.endTime : (modalWorkTypeSelect.value === '평일' ? (dayOfWeek === 5 ? "15:00" : globalConfig.endTime) : "");

            startTimeInput.value = sTime;
            endTimeInput.value = eTime;

            applyTimeInputRules(modalWorkTypeSelect.value, dateStr);
            updatePreview();
            
            timeModal.classList.add('open');
        }

        function updatePreview() {
            let parsed = parseDailySheet(selectedDateStr, modalWorkTypeSelect.value, startTimeInput.value, endTimeInput.value);
            let h = Math.floor(parsed.overtimeMins / 60);
            let m = parsed.overtimeMins % 60;
            
            document.getElementById('preview-overtime').textContent = parsed.overtimeMins > 0 ? `${h}H ${String(m).padStart(2, '0')}M` : "0H 00M";
            document.getElementById('preview-meals').textContent = `조식 ${parsed.breakfast} / 급량 ${parsed.lunch}`;
        }

        function saveTimeData(e) {
            e.preventDefault();
            if (!attendanceData[selectedDateStr]) attendanceData[selectedDateStr] = {};
            
            attendanceData[selectedDateStr].workType = modalWorkTypeSelect.value;
            attendanceData[selectedDateStr].startTime = startTimeInput.value;
            attendanceData[selectedDateStr].endTime = endTimeInput.value;

            let parsed = parseDailySheet(selectedDateStr, modalWorkTypeSelect.value, startTimeInput.value, endTimeInput.value);
            attendanceData[selectedDateStr].breakfast = parsed.breakfast;
            attendanceData[selectedDateStr].lunch = parsed.lunch;
            attendanceData[selectedDateStr].overtimeText = parsed.timeText;

            localStorage.setItem('overtime_data_v9_4', JSON.stringify(attendanceData));
            sendDataToGoogleSheets(selectedDateStr, attendanceData[selectedDateStr]);
            
            renderCalendar();
            updateDashboard();
            timeModal.classList.remove('open');
            showToast("저장되었습니다.");
        }

        function clearTimeData() {
            if (attendanceData[selectedDateStr]) {
                delete attendanceData[selectedDateStr].workType;
                delete attendanceData[selectedDateStr].startTime;
                delete attendanceData[selectedDateStr].endTime;
                delete attendanceData[selectedDateStr].breakfast;
                delete attendanceData[selectedDateStr].lunch;
                delete attendanceData[selectedDateStr].overtimeText;
                
                if (Object.keys(attendanceData[selectedDateStr]).length === 0) {
                    delete attendanceData[selectedDateStr];
                }
            }
            
            localStorage.setItem('overtime_data_v9_4', JSON.stringify(attendanceData));
            sendDataToGoogleSheets(selectedDateStr, null);
            
            renderCalendar();
            updateDashboard();
            timeModal.classList.remove('open');
            showToast("초기화 되었습니다.");
        }

        function openReportModal() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            let totalOvertimeMins = 0;
            let holidayCount = 0;
            let bf1Count = 0, bf2Count = 0, lunchCount = 0;

            for (let day = 1; day <= lastDay; day++) {
                const cellDate = new Date(year, month, day);
                if (cellDate > todayMidnight) continue;

                const dayOfWeek = cellDate.getDay();
                const isHoli = isLegalHoliday(year, month, day);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                let workType = getBaseWorkType(year, month, day, dayOfWeek, isHoli);
                let savedData = attendanceData[dateStr] || {};
                let actualWorkType = savedData.workType || workType;
                
                if (actualWorkType === '휴일근무' && savedData.startTime && savedData.endTime) {
                    holidayCount++;
                }

                let sTime = savedData.startTime !== undefined ? savedData.startTime : (actualWorkType === '평일' ? (dayOfWeek === 5 ? "06:00" : globalConfig.startTime) : "");
                let eTime = savedData.endTime !== undefined ? savedData.endTime : (actualWorkType === '평일' ? (dayOfWeek === 5 ? "15:00" : globalConfig.endTime) : "");

                let parsed = parseDailySheet(dateStr, actualWorkType, sTime, eTime);

                totalOvertimeMins += parsed.overtimeMins;
                if (day <= 15) bf1Count += parsed.breakfast;
                else bf2Count += parsed.breakfast;
                lunchCount += parsed.lunch;
            }

            const rates = gradeRates[userGrade];
            const overtimeHours = Math.floor(totalOvertimeMins / 60);
            
            const overtimeAmount = overtimeHours * rates.hourly;
            const holidayAmount = holidayCount * rates.holiday;

            document.getElementById('rep-actual-overtime').textContent = `${overtimeHours}H ${String(totalOvertimeMins % 60).padStart(2, '0')}M`;
            document.getElementById('rep-hourly-rate').textContent = rates.hourly.toLocaleString() + "원";
            document.getElementById('rep-overtime-amount').textContent = overtimeAmount.toLocaleString() + "원";

            document.getElementById('rep-holiday-count').textContent = holidayCount + "일";
            document.getElementById('rep-holiday-rate').textContent = rates.holiday.toLocaleString() + "원";
            document.getElementById('rep-holiday-amount').textContent = holidayAmount.toLocaleString() + "원";

            document.getElementById('rep-bf1-val').textContent = (bf1Count * 8000).toLocaleString() + "원";
            document.getElementById('rep-bf2-val').textContent = (bf2Count * 8000).toLocaleString() + "원";
            document.getElementById('rep-lunch-val').textContent = (Math.min(lunchCount, 20) * 8000).toLocaleString() + "원";

            reportModal.classList.add('open');
        }

        function openConfigModal() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const injector = document.getElementById('config-rows-injector');
            
            injector.innerHTML = '';
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

            for (let day = 1; day <= lastDay; day++) {
                const cellDate = new Date(year, month, day);
                const dayOfWeek = cellDate.getDay();
                const isHoli = isLegalHoliday(year, month, day);
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                let defaultType = getBaseWorkType(year, month, day, dayOfWeek, isHoli);
                let saved = attendanceData[dateStr] || {};
                let currentType = saved.workType || defaultType;

                let row = document.createElement('div');
                row.className = 'config-row';
                
                let labelColor = (dayOfWeek === 0 || isHoli) ? 'var(--holiday-color)' : (dayOfWeek === 6 ? 'var(--sat-color)' : 'var(--text-main)');
                let dateLabel = document.createElement('div');
                dateLabel.className = 'config-date-label';
                dateLabel.style.color = labelColor;
                dateLabel.textContent = `${month + 1}/${day} (${dayNames[dayOfWeek]})`;
                row.appendChild(dateLabel);

                let select = document.createElement('select');
                select.className = 'config-select';
                
                const types = ['평일', '휴일근무', '휴무', '연가', '대휴', '특가', '공가', '조퇴', '오전', '오후'];
                types.forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    if (t === currentType) opt.selected = true;
                    select.appendChild(opt);
                });
                
                select.addEventListener('change', (e) => {
                    if (!attendanceData[dateStr]) attendanceData[dateStr] = {};
                    attendanceData[dateStr].workType = e.target.value;
                    localStorage.setItem('overtime_data_v9_4', JSON.stringify(attendanceData));
                    sendDataToGoogleSheets(dateStr, attendanceData[dateStr]);
                    renderCalendar();
                    updateDashboard();
                });
                row.appendChild(select);

                let checks = document.createElement('div');
                checks.className = 'config-duty-checkboxes';
                
                let lblSuk = document.createElement('label');
                lblSuk.className = 'config-check-lbl';
                let chkSuk = document.createElement('input');
                chkSuk.type = 'checkbox';
                chkSuk.checked = saved.isSukjik || false;
                
                chkSuk.addEventListener('change', (e) => {
                    if (!attendanceData[dateStr]) attendanceData[dateStr] = {};
                    attendanceData[dateStr].isSukjik = e.target.checked;
                    localStorage.setItem('overtime_data_v9_4', JSON.stringify(attendanceData));
                    sendDataToGoogleSheets(dateStr, attendanceData[dateStr]);
                    renderCalendar();
                });
                lblSuk.appendChild(chkSuk);
                lblSuk.appendChild(document.createTextNode('숙직'));
                checks.appendChild(lblSuk);

                let lblIl = document.createElement('label');
                lblIl.className = 'config-check-lbl';
                let chkIl = document.createElement('input');
                chkIl.type = 'checkbox';
                chkIl.checked = saved.isIljik || false;
                
                chkIl.addEventListener('change', (e) => {
                    if (!attendanceData[dateStr]) attendanceData[dateStr] = {};
                    attendanceData[dateStr].isIljik = e.target.checked;
                    localStorage.setItem('overtime_data_v9_4', JSON.stringify(attendanceData));
                    sendDataToGoogleSheets(dateStr, attendanceData[dateStr]);
                    renderCalendar();
                });
                lblIl.appendChild(chkIl);
                lblIl.appendChild(document.createTextNode('일직'));
                checks.appendChild(lblIl);

                row.appendChild(checks);
                injector.appendChild(row);
            }
            configListModal.classList.add('open');
        }
    </script>
</body>
</html>
